services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sakhi
      POSTGRES_USER: sakhi
      POSTGRES_PASSWORD: sakhipassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakhi -d sakhi"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://sakhi:sakhipassword@db:5432/sakhi
      JWT_SECRET: change-this-secret-in-production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
